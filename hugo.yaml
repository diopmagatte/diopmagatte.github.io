baseURL: https://diopmagatte.github.io
languageCode: en-us
title: "Magatte DIOP | Security Analyst"

module:
  imports:
  - path: github.com/hugo-toha/toha/v4
  mounts:
  - source: static/files
    target: static/files
  - source: ./node_modules/flag-icon-css/flags
    target: static/flags
  - source: ./node_modules/@fontsource/mulish/files
    target: static/files
  - source: ./node_modules/katex/dist/fonts
    target: static/fonts

languages:
  en:
    languageName: English
    weight: 1
  fr:
    languageName: Français
    weight: 2

markup:
  goldmark:
    renderer:
      unsafe: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

enableEmoji: true

params:
  gitRepo: https://github.com/diopmagatte/diopmagatte.github.io
  background: /images/background.jpg
  backgroundBlur: true
  backgroundBlurAmount: 2
  features:
    portfolio:
      enable: true
    blog:
      enable: false
    darkMode:
      enable: true
  footer:
    enable: true
    navigation:
      enable: true
    contactMe:
      enable: true
    credentials:
      enable: false
    newsletter:
      enable: false