skills:

# ================= OUTILS DE SÉCURITÉ =================

- name: Splunk
  logo: /images/sections/skills/splunk.png
  summary: Surveillance de la sécurité, analyse de journaux et investigation d'activités suspectes via des **tableaux de bord SIEM** et des **requêtes de recherche**
  categories: ["security"]

- name: Velociraptor
  logo: /images/sections/skills/velociraptor.png
  summary: Collecte d'artefacts sur les points de terminaison, investigation et **threat hunting** dans des environnements **DFIR**
  categories: ["security"]

- name: MITRE Caldera
  summary: Émulation d'adversaires alignée sur les techniques **MITRE ATT&CK** pour la validation des capacités de détection et les tests de sécurité
  categories: ["security"]

- name: Kali Linux Tools
  logo: /images/sections/skills/kali.png
  summary: Expérience pratique avec **Wireshark**, **Burp Suite**, **Nmap**, **Metasploit** et des outils d'analyse réseau pour les tests de sécurité et la découverte de vulnérabilités
  categories: ["security"]

- name: Zabbix
  logo: /images/sections/skills/zabbix.png
  summary: Configuration de la surveillance d'infrastructure et des alertes pour assurer la **disponibilité des systèmes** et la visibilité opérationnelle
  categories: ["security"]


# ================= GESTION DES VULNÉRABILITÉS =================

- name: Nessus
  summary: Analyse des vulnérabilités, priorisation des risques et suivi des remédiations dans des **évaluations de sécurité en laboratoire**
  categories: ["vulnerability"]

- name: OpenVAS
  logo: /images/sections/skills/openvas.png
  summary: Évaluation des vulnérabilités et génération de rapports de sécurité
  categories: ["vulnerability"]

- name: Analyse des risques
  logo: /images/sections/skills/risk.png
  summary: Priorisation des vulnérabilités selon le **niveau de risque**, l'**impact** et l'urgence de remédiation
  categories: ["vulnerability"]


# ================= SYSTÈMES & IDENTITÉ =================

- name: Active Directory
  logo: /images/sections/skills/ad.png
  summary: Gestion du cycle de vie des utilisateurs et administration du **contrôle d'accès basé sur l'identité**
  categories: ["systems"]

- name: Group Policy (GPO)
  summary: Configuration des politiques de sécurité et application centralisée des configurations des points de terminaison via la **stratégie de groupe**
  categories: ["systems"]

- name: Microsoft 365
  logo: /images/sections/skills/m365.png
  summary: Provisionnement des utilisateurs et configuration des accès dans **Microsoft 365**, incluant l'administration d'**Exchange Online**, des **paramètres de sécurité des e-mails** et des fonctionnalités de conformité **Microsoft Purview**
  categories: ["systems"]

- name: Windows Server
  logo: /images/sections/skills/windows.png
  summary: Configuration et administration des serveurs incluant les services **DNS**, **DHCP** et **IIS** en environnement d'entreprise
  categories: ["systems"]

- name: Linux
  logo: /images/sections/skills/linux.png
  summary: Administration système et utilisation du shell avec Ubuntu et RHEL en environnement d'entreprise
  categories: ["systems"]


# ================= SÉCURITÉ RÉSEAU =================

- name: Pare-feu Fortigate
  summary: Configuration des politiques de pare-feu, déploiement de **VPN** et mise en œuvre du contrôle du trafic réseau
  categories: ["network"]

- name: Configuration VPN
  logo: /images/sections/skills/vpn.png
  summary: Mise en place de connectivité distante sécurisée via des **solutions de tunnelisation chiffrée**
  categories: ["network"]

- name: VLAN
  logo: /images/sections/skills/vlan.png
  summary: Configuration de la segmentation réseau pour l'**isolation du trafic** et le zonage de sécurité
  categories: ["network"]

- name: TCP/IP
  summary: Fondamentaux de la communication réseau
  categories: ["network"]


# ================= CONCEPTS DE SÉCURITÉ =================

- name: Framework MITRE ATT&CK
  logo: /images/sections/skills/mitre.png
  summary: Correspondance des techniques adversariales avec les **stratégies de détection** et les scénarios de simulation d'attaques
  categories: ["concepts"]

- name: Analyse de journaux
  logo: /images/sections/skills/log.png
  summary: Investigation et surveillance des événements de sécurité
  categories: ["concepts"]

- name: Détection d'incidents
  logo: /images/sections/skills/incident.png
  summary: Identification des comportements suspects et des alertes de sécurité
  categories: ["concepts"]

- name: Contrôle d'accès
  logo: /images/sections/skills/access.png
  summary: Mise en œuvre des **principes du moindre privilège** et concepts de gouvernance des accès basée sur l'identité
  categories: ["concepts"]