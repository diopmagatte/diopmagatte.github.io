  positions:
  - designation: Analyste en sécurité senior
    start: Jan 2022
    responsibilities:
    - Direction d'une équipe de 4 analystes dans un SOC 24/7 surveillant plus de 500 endpoints clients.
    - Développement et optimisation de règles de corrélation Splunk, réduisant les faux positifs de 35%.
